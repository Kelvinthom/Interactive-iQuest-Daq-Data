<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iQuest Explorer | Kelvin Thom</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        :root {
            --bg-app: #f1f5f9; --bg-main: #ffffff; --border-color: #cbd5e1;
            --text-main: #0f172a; --text-muted: #64748b; --accent: #2563eb;
            --j-key: #7c3aed; --j-str: #16a34a; --j-num: #ea580c; --j-bool: #dc2626; --j-null: #94a3b8;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg-app); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 64px; background: white; border-bottom: 2px solid var(--border-color); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; z-index: 50; }
        .nav-left { display: flex; align-items: center; gap: 40px; }
        .brand { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 800; color: #0f172a; }
        .brand span { color: var(--accent); }
        
        .nav-links { display: flex; gap: 8px; }
        .nav-links a { 
            text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 14px; 
            padding: 8px 16px; border-radius: 8px; transition: 0.2s; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-links a:hover { background: #f1f5f9; color: var(--text-main); }
        .nav-links a.active { color: var(--accent); background: #eff6ff; }

        .author-banner {
            display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 6px 20px; border-radius: 12px; color: white; border: 1px solid rgba(255,255,255,0.1);
        }
        .author-banner .label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; font-weight: 800; }
        .author-banner .name { font-size: 14px; font-weight: 600; }

        .view-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        .page-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        .page-view.active { display: flex; }

        .explorer-layout { display: flex; flex: 1; overflow: hidden; }
        aside { width: 260px; background: #f8fafc; border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .stat-card { background: white; border: 1px solid var(--border-color); padding: 14px; border-radius: 10px; }
        .stat-card .l { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .stat-card .v { font-size: 20px; font-weight: 700; color: var(--accent); }
        
        main { flex: 1; display: flex; flex-direction: column; background: white; margin: 12px; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; }
        .toolbar { padding: 12px 20px; background: #f8fafc; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .btn-dl { background: #0f172a; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; }

        .json-viewer { flex: 1; overflow: auto; padding: 24px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; }
        .json-node { margin-left: 24px; }
        .json-line { display: flex; padding: 2px 0; cursor: pointer; white-space: nowrap; align-items: center; }
        .json-line:hover { background: #f8fafc; }
        .json-toggle { width: 20px; color: var(--text-muted); display: inline-flex; }
        .json-content-block { border-left: 1px solid #e2e8f0; margin-left: 9px; }
        
        .syntax-key { color: var(--j-key); font-weight: 600; margin-right: 8px; }
        .syntax-string { color: var(--j-str); }
        .syntax-number { color: var(--j-num); }

        .notes-view { padding: 40px; overflow-y: auto; background: white; flex: 1; }
        .notes-content { max-width: 850px; margin: 0 auto; line-height: 1.8; }
        
        footer { background: #0f172a; color: #64748b; padding: 12px 24px; font-size: 11px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <header>
        <div class="nav-left">
            <div class="brand"><i data-lucide="layers" size="22"></i> iQuest<span>Explorer</span></div>
            <nav class="nav-links">
                <a id="nav-home" class="active" onclick="showPage('home')"><i data-lucide="home" size="16"></i> Home</a>
                <a id="nav-notes" onclick="showPage('notes')"><i data-lucide="book-open" size="16"></i> Notes</a>
            </nav>
        </div>
        <div class="author-banner">
            <div>
                <div class="label">Primary Author</div>
                <div class="name">Kelvin Thom</div>
            </div>
            <i data-lucide="shield-check" size="20" style="color: #34d399;"></i>
        </div>
    </header>

    <div class="view-container">
        <div id="page-home" class="page-view active">
            <div class="explorer-layout">
                <aside>
                    <div class="stat-card">
                        <div class="l">Data Weight</div>
                        <div id="size-val" class="v">0.00 MB</div>
                    </div>
                    <div class="stat-card">
                        <div class="l">Root Keys</div>
                        <div id="key-count" class="v">0</div>
                    </div>
                </aside>
                <main>
                    <div class="toolbar">
                        <div style="font-weight: 700; color: var(--text-muted); font-size: 11px; display: flex; align-items: center; gap: 6px;">
                            <i data-lucide="activity" size="14"></i> LIVE_DATA_VIEWER
                        </div>
                        <button class="btn-dl" onclick="downloadJSON()">
                            <i data-lucide="download" size="14"></i> Download (.json)
                        </button>
                    </div>
                    <div class="json-viewer" id="json-root">Loading...</div>
                </main>
            </div>
        </div>

        <div id="page-notes" class="page-view">
            <div class="notes-view">
                <div class="notes-content">
                    <h1>iQuest-Vib-Daq Data Specification</h1>
                    <p>Documentation for vibration monitoring parameters.</p>
                    <pre><code class="language-json">{ "Status": "Complete", "Version": "3.2" }</code></pre>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <span>Engine: v3.2.0-Production</span>
        <span>&copy; 2026 Kelvin Thom</span>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

    <script>
        lucide.createIcons();
        let cachedData = null;

        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        function createSyntaxSpan(value) {
            const span = document.createElement('span');
            if (typeof value === 'string') { span.className = 'syntax-string'; span.textContent = `"${value}"`; }
            else { span.className = 'syntax-number'; span.textContent = value; }
            return span;
        }

        function renderLazyLevel(obj, container) {
            Object.keys(obj).forEach(key => {
                const val = obj[key];
                const isObj = val !== null && typeof val === 'object';
                const node = document.createElement('div');
                node.className = 'json-node';
                const line = document.createElement('div');
                line.className = 'json-line';

                const toggle = document.createElement('span');
                toggle.className = 'json-toggle';
                toggle.innerHTML = isObj ? '<i data-lucide="chevron-right" size="14"></i>' : '<i data-lucide="minus" size="12" style="opacity:0.2"></i>';
                line.appendChild(toggle);

                const keySpan = document.createElement('span');
                keySpan.className = 'syntax-key';
                keySpan.textContent = `"${key}":`;
                line.appendChild(keySpan);

                if (isObj) {
                    const hint = document.createElement('span');
                    hint.style.color = '#94a3b8';
                    hint.textContent = Array.isArray(val) ? ` [${val.length}]` : ` {…}`;
                    line.appendChild(hint);

                    line.onclick = (e) => {
                        e.stopPropagation();
                        let block = node.querySelector('.json-content-block');
                        if (!block) {
                            block = document.createElement('div');
                            block.className = 'json-content-block';
                            renderLazyLevel(val, block);
                            node.appendChild(block);
                            toggle.style.transform = 'rotate(90deg)';
                        } else {
                            const hidden = block.style.display === 'none';
                            block.style.display = hidden ? 'block' : 'none';
                            toggle.style.transform = hidden ? 'rotate(90deg)' : 'rotate(0deg)';
                        }
                    };
                } else {
                    line.appendChild(createSyntaxSpan(val));
                }

                node.appendChild(line);
                container.appendChild(node);
                lucide.createIcons({props: {node}});
            });
        }

        fetch('./data.json')
            .then(res => res.json())
            .then(data => {
                cachedData = data;
                // --- MB CONVERSION LOGIC ---
                const sizeInBytes = new Blob([JSON.stringify(data)]).size;
                const sizeInMB = (sizeInBytes / (1024 * 1024)).toFixed(2);
                document.getElementById('size-val').textContent = sizeInMB + " MB";
                
                document.getElementById('key-count').textContent = Object.keys(data).length;
                const root = document.getElementById('json-root');
                root.innerHTML = '';
                renderLazyLevel(data, root);
            })
            .catch(() => {
                document.getElementById('json-root').innerHTML = "No data.json found.";
            });

        function downloadJSON() {
            if (!cachedData) return;
            const blob = new Blob([JSON.stringify(cachedData, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = 'iQuest_Full_Export.json';
            a.click();
        }
    </script>
</body>
</html>
