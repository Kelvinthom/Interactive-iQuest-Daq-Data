<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iQuest Explorer | Kelvin Thom</title>
<style>
    :root {
        --bg-app: #f8fafc; --bg-main: #ffffff; --border-color: #cbd5e1;
        --text-main: #0f172a; --text-muted: #64748b; --accent: #2563eb;
        --j-key: #7c3aed; --j-str: #16a34a; --j-num: #ea580c; --j-bool: #dc2626;
    }
    * { box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { margin: 0; background: var(--bg-app); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { height: 60px; background: white; border-bottom: 2px solid var(--border-color); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; z-index: 10; }
    .logo-badge { background: #0f172a; color: white; padding: 4px 8px; border-radius: 4px; font-weight: 800; margin-right: 8px; }
    .author-tag { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .container { display: flex; flex: 1; overflow: hidden; }
    aside { width: 280px; background: #f1f5f9; border-right: 2px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .stat-card { background: white; border: 1px solid var(--border-color); padding: 12px; border-radius: 6px; }
    .label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .value { font-size: 18px; font-weight: 700; margin-top: 4px; color: var(--accent); }
    main { flex: 1; display: flex; flex-direction: column; background: white; }
    .toolbar { padding: 12px 24px; background: white; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
    .btn-dl { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px; transition: opacity 0.2s; }
    .btn-dl:hover { opacity: 0.9; }
    .json-viewer { flex: 1; overflow: auto; padding: 20px; font-family: monospace; font-size: 13px; line-height: 1.5; }
    .json-node { margin-left: 12px; }
    .json-line { display: flex; align-items: flex-start; cursor: pointer; padding: 2px 4px; border-radius: 4px; white-space: nowrap; }
    .json-line:hover { background: #f1f5f9; }
    .json-toggle { display: inline-block; width: 16px; color: var(--text-muted); font-size: 10px; user-select: none; transition: transform 0.1s; }
    .json-toggle.collapsed { transform: rotate(-90deg); }
    .json-content-block { margin-left: 8px; border-left: 1px solid #e2e8f0; }
    .key { color: var(--j-key); font-weight: 600; margin-right: 4px; }
    .string { color: var(--j-str); }
    .number { color: var(--j-num); }
    .boolean { color: var(--j-bool); }
    .type-hint { color: var(--text-muted); font-style: italic; font-size: 11px; margin-left: 8px; }
    footer { background: #0f172a; color: #94a3b8; padding: 6px 24px; font-size: 11px; display: flex; justify-content: space-between; }
</style>
</head>
<body>
    <header>
        <div><span class="logo-badge">IQ</span> <b>iQuest</b> Explorer</div>
        <div class="author-tag">Author: Kelvin Thom</div>
        <div style="font-size: 12px;"><span id="status-dot" style="color:#eab308">●</span> <span id="status-text">LOADING_DATA</span></div>
    </header>
    <div class="container">
        <aside>
            <div class="label">Performance</div>
            <div class="stat-card"><div class="label">Payload</div><div id="size-val" class="value">--</div></div>
            <div class="stat-card"><div class="label">Root Keys</div><div id="key-count" class="value">--</div></div>
            <div class="stat-card"><div class="label">Render Mode</div><div class="value" style="font-size: 14px; color:#16a34a;">GitHub Static</div></div>
        </aside>
        <main>
            <div class="toolbar">
                <div style="font-weight: 700; color: var(--text-muted); font-size: 11px;">LAZY RENDER ENABLED</div>
                <button class="btn-dl" onclick="downloadJSON()">📥 Export JSON</button>
            </div>
            <div class="json-viewer" id="json-root">
                <div style="padding: 20px; color: var(--text-muted);">Fetching data.json...</div>
            </div>
        </main>
    </div>
    <footer>
        <span>iQuest Engine v3.1 | Build: 2026.Static</span>
        <span>Hosted on GitHub Pages</span>
    </footer>

    <script>
        let cachedData = null;

        // 1. Fetch data from the static file
        fetch('./data.json')
            .then(res => {
                if (!res.ok) throw new Error("File data.json not found in repository");
                return res.json();
            })
            .then(data => {
                cachedData = data;
                updateStats(data);
                renderLevel(data, document.getElementById('json-root'), true);
                
                // Update Status UI
                document.getElementById('status-dot').style.color = '#22c55e';
                document.getElementById('status-text').textContent = 'READY';
            })
            .catch(err => {
                document.getElementById('json-root').innerHTML = `<div style="color:var(--j-bool); font-weight:bold;">Error: ${err.message}</div>`;
                document.getElementById('status-dot').style.color = '#dc2626';
                document.getElementById('status-text').textContent = 'OFFLINE';
            });

        // 2. Performance stats (Browser-compatible version)
        function updateStats(data) {
            const jsonString = JSON.stringify(data);
            const sizeInBytes = new Blob([jsonString]).size;
            const sizeReadable = sizeInBytes > 1024 * 1024 
                ? (sizeInBytes / (1024 * 1024)).toFixed(2) + " MB" 
                : (sizeInBytes / 1024).toFixed(2) + " KB";
            
            document.getElementById('size-val').textContent = sizeReadable;
            document.getElementById('key-count').textContent = Object.keys(data).length;
        }

        // 3. Your original Render Logic (Kelvin's logic)
        function renderLevel(obj, container, clearFirst = false) {
            if (clearFirst) container.innerHTML = '';
            const frag = document.createDocumentFragment();
            Object.keys(obj).forEach(key => {
                const val = obj[key];
                const isObj = val !== null && typeof val === 'object';
                const node = document.createElement('div');
                node.className = 'json-node';
                const line = document.createElement('div');
                line.className = 'json-line';
                if (isObj) {
                    const toggle = document.createElement('span');
                    toggle.className = 'json-toggle collapsed';
                    toggle.textContent = '▼';
                    line.appendChild(toggle);
                    line.onclick = (e) => {
                        e.stopPropagation();
                        toggle.classList.toggle('collapsed');
                        let content = node.querySelector('.json-content-block');
                        if (!toggle.classList.contains('collapsed')) {
                            if (!content) {
                                content = document.createElement('div');
                                content.className = 'json-content-block';
                                renderLevel(val, content);
                                node.appendChild(content);
                            } else { content.style.display = 'block'; }
                        } else if (content) { content.style.display = 'none'; }
                    };
                } else {
                    const spacer = document.createElement('span');
                    spacer.className = 'json-toggle';
                    spacer.style.visibility = 'hidden';
                    spacer.textContent = '▼';
                    line.appendChild(spacer);
                }
                const keyS = document.createElement('span');
                keyS.className = 'key'; keyS.textContent = '"' + key + '":';
                line.appendChild(keyS);
                if (isObj) {
                    const hint = document.createElement('span');
                    hint.className = 'type-hint';
                    hint.textContent = Array.isArray(val) ? 'Array(' + val.length + ')' : 'Object';
                    line.appendChild(hint);
                } else {
                    const valS = document.createElement('span');
                    valS.className = typeof val;
                    valS.textContent = typeof val === 'string' ? '"' + val + '"' : val;
                    line.appendChild(valS);
                }
                node.appendChild(line);
                frag.appendChild(node);
            });
            container.appendChild(frag);
        }

        // 4. Export Logic
        function downloadJSON() {
            if (!cachedData) return alert("Data not loaded yet");
            const blob = new Blob([JSON.stringify(cachedData, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = 'iQuest_Data_Export.json';
            a.click();
        }
    </script>
</body>
</html>
