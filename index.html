<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iQuest Explorer | Kelvin Thom</title>
<style>
    :root {
        --bg-app: #f1f5f9; --bg-main: #ffffff; --border-color: #cbd5e1;
        --text-main: #0f172a; --text-muted: #64748b; --accent: #2563eb;
        --j-key: #7c3aed; --j-str: #16a34a; --j-num: #ea580c; --j-bool: #dc2626;
    }
    * { box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { margin: 0; background: var(--bg-app); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    header { 
        height: 64px; 
        background: white;
        border-bottom: 2px solid var(--border-color); 
        display: flex; 
        align-items: center; 
        padding: 0 32px; 
        justify-content: space-between; 
        z-index: 10; 
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand b { font-size: 20px; letter-spacing: -0.5px; color: #0f172a; }
    .brand span { color: var(--accent); font-weight: 400; }

    .author-badge {
        display: flex;
        align-items: center;
        background: #f8fafc;
        padding: 6px 14px;
        border-radius: 6px;
        border: 2px solid var(--border-color);
    }
    .author-badge .dot { width: 8px; height: 8px; background: #16a34a; border-radius: 50%; margin-right: 8px; }
    .author-badge span { font-size: 12px; font-weight: 700; color: #1e293b; text-transform: uppercase; }

    .container { display: flex; flex: 1; overflow: hidden; }
    
    /* Sidebar with Bold Border */
    aside { 
        width: 280px; 
        background: #f8fafc; 
        border-right: 2px solid var(--border-color); 
        padding: 24px; 
        display: flex; 
        flex-direction: column; 
        gap: 16px; 
    }
    .stat-card { 
        background: white; 
        border: 2px solid var(--border-color); 
        padding: 16px; 
        border-radius: 8px; 
    }
    .label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .value { font-size: 20px; font-weight: 700; margin-top: 4px; color: var(--accent); }
    
    /* Main Content with Bold Border */
    main { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        background: white; 
        margin: 16px; 
        border-radius: 8px; 
        border: 2px solid var(--border-color); 
        overflow: hidden; 
    }
    .toolbar { 
        padding: 16px 24px; 
        background: #f8fafc; 
        border-bottom: 2px solid var(--border-color); 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
    }
    
    .btn-dl { 
        background: #0f172a; 
        color: white; 
        border: none; 
        padding: 10px 20px; 
        border-radius: 4px; 
        font-weight: 700; 
        cursor: pointer; 
        font-size: 12px; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
    }
    .btn-dl:hover { background: var(--accent); }
    
    .json-viewer { 
        flex: 1; 
        overflow: auto; 
        padding: 20px; 
        font-family: 'JetBrains Mono', monospace; 
        font-size: 13px; 
        line-height: 1.6; 
    }
    .json-node { margin-left: 18px; }
    .json-line { 
        display: flex; 
        align-items: flex-start; 
        cursor: pointer; 
        padding: 4px 6px; 
        border-bottom: 1px solid #f1f5f9; /* Subtle line between data rows */
    }
    .json-line:hover { background: #f1f5f9; }
    .json-toggle { display: inline-block; width: 20px; color: var(--text-muted); font-size: 10px; }
    .json-toggle.collapsed { transform: rotate(-90deg); }
    .json-content-block { margin-left: 10px; border-left: 2px solid #e2e8f0; }
    
    .key { color: var(--j-key); font-weight: 600; margin-right: 6px; }
    .string { color: var(--j-str); }
    .number { color: var(--j-num); }
    .boolean { color: var(--j-bool); }
    
    footer { 
        background: #0f172a; 
        color: #94a3b8; 
        padding: 8px 32px; 
        font-size: 11px; 
        display: flex; 
        justify-content: space-between; 
    }
</style>
</head>
<body>
    <header>
        <div class="brand"><b>iQuest</b><span>Explorer</span></div>
        <div class="author-badge">
            <div class="dot"></div>
            <span>Auth: Kelvin Thom</span>
        </div>
        <div style="font-size: 12px; font-weight: 700; color: var(--text-muted);">
            <span id="status-dot" style="color:#eab308">●</span> <span id="status-text">SYNCING</span>
        </div>
    </header>
    <div class="container">
        <aside>
            <div class="label">System Metrics</div>
            <div class="stat-card"><div class="label">Payload Size</div><div id="size-val" class="value">--</div></div>
            <div class="stat-card"><div class="label">Total Keys</div><div id="key-count" class="value">--</div></div>
            <div class="stat-card">
                <div class="label">Engine Status</div>
                <div class="value" style="font-size: 14px; color:#16a34a;">Active Branch</div>
            </div>
        </aside>
        <main>
            <div class="toolbar">
                <div style="font-weight: 800; color: var(--text-muted); font-size: 11px;">READ_ONLY_ACCESS</div>
                <button class="btn-dl" onclick="downloadJSON()">📥 Download JSON</button>
            </div>
            <div class="json-viewer" id="json-root">
                <div style="padding: 20px; color: var(--text-muted);">Parsing data.json...</div>
            </div>
        </main>
    </div>
    <footer>
        <span>iQuest Engine v3.1 | GitHub Deploy</span>
        <span>&copy; 2026 Kelvin Thom</span>
    </footer>

    <script>
        let cachedData = null;

        fetch('./data.json')
            .then(res => res.json())
            .then(data => {
                cachedData = data;
                updateStats(data);
                renderLevel(data, document.getElementById('json-root'), true);
                document.getElementById('status-dot').style.color = '#22c55e';
                document.getElementById('status-text').textContent = 'STABLE';
            })
            .catch(err => {
                document.getElementById('json-root').innerHTML = `<div style="color:red; padding:20px;">Error loading data.json</div>`;
            });

        function updateStats(data) {
            const jsonString = JSON.stringify(data);
            const sizeInBytes = new Blob([jsonString]).size;
            const sizeReadable = sizeInBytes > 1024 * 1024 
                ? (sizeInBytes / (1024 * 1024)).toFixed(2) + " MB" 
                : (sizeInBytes / 1024).toFixed(2) + " KB";
            document.getElementById('size-val').textContent = sizeReadable;
            document.getElementById('key-count').textContent = Object.keys(data).length.toLocaleString();
        }

        function renderLevel(obj, container, clearFirst = false) {
            if (clearFirst) container.innerHTML = '';
            const frag = document.createDocumentFragment();
            Object.keys(obj).forEach(key => {
                const val = obj[key];
                const isObj = val !== null && typeof val === 'object';
                const node = document.createElement('div');
                node.className = 'json-node';
                const line = document.createElement('div');
                line.className = 'json-line';
                if (isObj) {
                    const toggle = document.createElement('span');
                    toggle.className = 'json-toggle collapsed';
                    toggle.textContent = '▼';
                    line.appendChild(toggle);
                    line.onclick = (e) => {
                        e.stopPropagation();
                        toggle.classList.toggle('collapsed');
                        let content = node.querySelector('.json-content-block');
                        if (!toggle.classList.contains('collapsed')) {
                            if (!content) {
                                content = document.createElement('div');
                                content.className = 'json-content-block';
                                renderLevel(val, content);
                                node.appendChild(content);
                            } else { content.style.display = 'block'; }
                        } else if (content) { content.style.display = 'none'; }
                    };
                } else {
                    const spacer = document.createElement('span');
                    spacer.className = 'json-toggle';
                    spacer.style.visibility = 'hidden';
                    spacer.textContent = '▼';
                    line.appendChild(spacer);
                }
                const keyS = document.createElement('span');
                keyS.className = 'key'; keyS.textContent = '"' + key + '":';
                line.appendChild(keyS);
                if (isObj) {
                    const hint = document.createElement('span');
                    hint.className = 'type-hint';
                    hint.textContent = Array.isArray(val) ? `[${val.length}]` : '{...}';
                    line.appendChild(hint);
                } else {
                    const valS = document.createElement('span');
                    valS.className = typeof val;
                    valS.textContent = typeof val === 'string' ? '"' + val + '"' : val;
                    line.appendChild(valS);
                }
                node.appendChild(line);
                frag.appendChild(node);
            });
            container.appendChild(frag);
        }

        function downloadJSON() {
            if (!cachedData) return;
            const blob = new Blob([JSON.stringify(cachedData)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = 'iQuest_Export_Kelvin.json';
            a.click();
        }
    </script>
</body>
</html>
